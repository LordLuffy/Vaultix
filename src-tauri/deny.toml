# cargo-deny configuration for Teams Manager
# Run: cargo deny check   (from src-tauri/)

# ── Advisories (vulnerabilities and unmaintained crates) ──────────────────────
[advisories]
# Unmaintained crates pulled transitively by Tauri/wry — no action possible on our end.
ignore = [
  # gtk-rs GTK3 bindings (Linux only, not included in the Windows binary)
  "RUSTSEC-2024-0411",  # gdkwayland-sys
  "RUSTSEC-2024-0412",  # gdk
  "RUSTSEC-2024-0413",  # atk
  "RUSTSEC-2024-0414",  # gdkx11-sys
  "RUSTSEC-2024-0415",  # gtk
  "RUSTSEC-2024-0416",  # atk-sys
  "RUSTSEC-2024-0417",  # gdkx11
  "RUSTSEC-2024-0418",  # gdk-sys
  "RUSTSEC-2024-0419",  # gtk-sys
  "RUSTSEC-2024-0420",  # gtk3-macros

  # Unmaintained utility crates (pulled by tauri-utils / tauri-macros)
  "RUSTSEC-2024-0370",  # proc-macro-error
  "RUSTSEC-2025-0057",  # fxhash

  # unic-* (pulled by tauri-utils for Unicode identifier handling)
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]

# uds_windows is yanked but pulled transitively by tauri-plugin-opener via zbus.
# Cannot update it directly — set to warn until Tauri fixes it.
yanked = "warn"

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
# This project is distributed under GPL-3.0.
# The dependencies below use permissive licenses (MIT, Apache, BSD…)
# all compatible with GPL-3.0.
allow = [
  "MIT",
  "MIT-0",              # MIT without attribution clause (dunce)
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",  # rustix, linux-raw-sys, wasi, wit-bindgen
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",                # ring, rustls, hyper-rustls
  "0BSD",               # adler2
  "BSL-1.0",            # ryu (Boost Software License — permissive)
  "Zlib",               # bytemuck, miniz_oxide, objc2-*
  "Unlicense",          # aho-corasick, memchr, walkdir
  "CC0-1.0",            # dunce (public domain)
  "CDLA-Permissive-2.0", # webpki-roots (Linux Foundation — permissive for data)
  "Unicode-3.0",        # icu_* crates (pulled by idna/url/reqwest)
  "MPL-2.0",            # cssparser, selectors, option-ext (pulled by tauri-utils/wry)
  "LGPL-2.1-or-later",  # r-efi (EFI/UEFI — WASI/Linux target, not linked on Windows)
]

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
# Deny crates with known unpatched CVEs (beyond "unmaintained")
deny = []

# ── Allowed sources ───────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
